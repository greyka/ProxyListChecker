name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish
        shell: pwsh
        run: |
          dotnet publish ProxyListChecker/ProxyListChecker.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:PublishSingleFile=false -o publish
      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path publish/* -DestinationPath "ProxyListChecker-$tag-win-x64.zip"
      - uses: softprops/action-gh-release@v2
        with:
          files: ProxyListChecker-*.zip
          generate_release_notes: true
